query CurrentUser(
  $databaseId: Uuid!
) {
  currentUser {
    uuid
    name
    representedInstitutions {
      edges {
        node {
          uuid
          name
          managedInstitutions {
            edges {
              node {
                uuid
                name
              }
            }
            totalCount
          }
        }
        role
      }
      totalCount
    }
    databaseOperatingRepresentedInstitutions: representedInstitutions(
      where: {
        or: [
          {
            and: [
              { role: { in: [ASSISTANT, OWNER] } }
              {
                institution: {
                  operatedDatabases: {
                    some: {
                      id: { equalTo: $databaseId }
                    }
                  }
                }
              }
            ]
          }
          {
            and: [
              { role: { in: [ASSISTANT, OWNER] } }
              {
                institution: {
                  managedInstitutions: {
                    some: {
                      operatedDatabases: {
                        some: {
                          id: {
                            equalTo: $databaseId
                          }
                        }
                      }
                    }
                  }
                }
              }
            ]
          }
        ]
      }
    ) {
      edges {
        node {
          uuid
          name
        }
        role
      }
      totalCount
    }
  }
}