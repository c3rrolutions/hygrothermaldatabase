fragment DataFields on Data {
  uuid
  timestamp
  componentId
  name
  description
  warnings
  creatorId
  createdAt
  appliedMethod {
    methodId
    arguments {
      name
      value
    }
    sources {
      name
      value {
        dataId
        dataTimestamp
        dataKind
        databaseId
      }
    }
  }
  approvals {
    timestamp
    signature
    keyFingerprint
    query
    variables
    message
    statement {
      __typename
      ... on Publication {
        abstract
        arXiv
        authors
        doi
        section
        title
        urn
        webAddress
      }
      ... on Standard {
        abstract
        locator
        section
        standardizers
        title
        year
        numeration {
          mainNumber
          prefix
          suffix
        }
      }
    }
    approverId
  }
  resources {
    description
    hashValue
    locator
    dataFormatId
    archivedFilesMetaInformation {
      path
      dataFormatId
    }
  }
  resourceTree {
    root {
      vertexId
      value {
        description
        hashValue
        locator
        dataFormatId
        archivedFilesMetaInformation {
          path
          dataFormatId
        }
      }
    }
    nonRootVertices {
      vertexId
      parentId
      value {
        description
        hashValue
        locator
        dataFormatId
        archivedFilesMetaInformation {
          path
          dataFormatId
        }
      }
      appliedConversionMethod {
        methodId
        arguments {
          name
          value
        }
        sourceName
      }
    }
  }
  locale
}
