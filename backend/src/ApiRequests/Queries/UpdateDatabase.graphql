mutation UpdateDatabase(
    $input: UpdateDatabaseInput!
) {
    updateDatabase(input: $input) {
        database {
            uuid
            name
            description
            locator
            verificationState
            verificationCode
            operator {
                node {
                    uuid
                }
            }
            isAuthorizedToUpdateNode
            isAuthorizedToVerifyNode
        }
        errors {
            code
            message
            path
        }
    }
}