# Keep setup in sync with the one in ./docker-compose.development.yaml
name: "${NAME:?required}_${ENVIRONMENT:?required}"

services:
  database:
    # Keep version in sync with the one in `Startup.cs`
    image: "postgres:13.23-trixie"
    volumes:
      - data:/var/lib/postgresql/data
      - ./.psqlrc:/etc/postgresql-common/psqlrc:ro
    environment:
      POSTGRES_USER: "${POSTGRES_USER:?required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?required}"
      POSTGRES_DB: "postgres" # default database used to run `./database.mk drop`
    # ports:
    #   - "0.0.0.0:5432:5432"
    # For possible command-line arguments see
    # https://www.postgresql.org/docs/current/app-postgres.html
    # and for possible configuration parameters like `max_connections` see
    # https://www.postgresql.org/docs/current/runtime-config.html
    # For an introduction to logging see
    # https://betterstack.com/community/guides/logging/how-to-start-logging-with-postgresql/
    command:
      - "-c"
      - "max_connections=100"
      # - "-c"
      # - "log_statement=all"
      # - "-c"
      # - "log_duration=1"
    restart: "unless-stopped"
    healthcheck:
      # pg_isready: https://www.postgresql.org/docs/13/app-pg-isready.html
      test: ["CMD-SHELL", "pg_isready --username='${POSTGRES_USER:?required}'"]
      interval: "30s"
      timeout: "5s"
      retries: 3
      start_period: "60s"
      start_interval: "5s"
    labels:
      autoheal: "true"
    pull_policy: "always"

  backend:
    image: "${NAME:?required}-backend:${TARGET:?required}"
    depends_on:
      database:
        condition: "service_started"
    volumes:
      - backend_logs:/app/logs
      - files:/app/files
      # persist certificates in the [`X509Store`](https://learn.microsoft.com/en-us/dotnet/api/system.security.cryptography.x509certificates.x509store)
      - certificates:/root/.dotnet/corefx/cryptography/x509stores
      - gnupg:/root/.gnupg
      - ./gnupg.conf:/root/.gnupg/common.conf
      - ./gpg-agent.conf:/root/.gnupg/gpg-agent.conf
    environment:
      # https://docs.microsoft.com/en-us/aspnet/core/fundamentals/configuration/?view=aspnetcore-3.1#environment-variables
      ASPNETCORE_URLS: "http://0.0.0.0:8080"
      ASPNETCORE_ENVIRONMENT: "production"
      XBASE_Host: "${HOST:?required}"
      XBASE_Subdomain: "${SUBDOMAIN:?required}"
      XBASE_MetabaseHost: "${METABASE_HOST:?required}"
      XBASE_DatabaseId: "${DATABASE_ID:?required}"
      XBASE_OperatorId: "${OPERATOR_ID:?required}"
      XBASE_Database__Host: "database"
      XBASE_Database__Port: 5432
      XBASE_Database__Name: "${POSTGRES_DATABASE_NAME:?required}"
      XBASE_Database__UserName: "${POSTGRES_USER:?required}"
      XBASE_Database__Password: "${POSTGRES_PASSWORD:?required}"
      XBASE_Database__SchemaName: "database"
      XBASE_OpenIdConnectClient__Id: "${OPEN_ID_CONNECT_CLIENT_ID:?required}"
      XBASE_OpenIdConnectClient__Secret: "${OPEN_ID_CONNECT_CLIENT_SECRET:?required}"
      XBASE_VerificationCode: "${VERIFICATION_CODE:?required}"
      XBASE_GnupgSecretSigningKey__Fingerprint: "${GNUPG_SECRET_SIGNING_KEY_FINGERPRINT:?required}"
      XBASE_GnupgSecretSigningKey__Passphrase: "${GNUPG_SECRET_SIGNING_KEY_PASSPHRASE:?required}"
      XBASE_OpenTelemetry__Host: "${OPEN_TELEMETRY_HOST:?required}"
      XBASE_OpenTelemetry__GrpcPort: "${OPEN_TELEMETRY_GRPC_PORT:?required}"
      # The value `/dev/pts/0` is the output of running `tty` within `shellb`
      # https://www.gnupg.org/documentation/manuals/gnupg/Invoking-GPG_002dAGENT.html
      GPG_TTY: "/dev/pts/0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # https://docs.microsoft.com/en-us/aspnet/core/fundamentals/configuration/?view=aspnetcore-5.0#command-line
    command:
      - "dotnet"
      - "/app/App.dll"
      # - "/Serilog:MinimumLevel:Default=Debug"
      # - "/Serilog:MinimumLevel:Microsoft=Debug"
      # - "/Serilog:MinimumLevel:Microsoft.Hosting.Lifetime=Debug"
      # - "/Serilog:MinimumLevel:Override:Microsoft=Debug"
      # - "/Serilog:MinimumLevel:Override:Microsoft.AspNetCore=Debug"
      # - "/Serilog:MinimumLevel:Override:System=Debug"
    restart: "unless-stopped"
    healthcheck:
      # https://docs.microsoft.com/en-us/aspnet/core/host-and-deploy/health-checks?view=aspnetcore-5.0#docker-example
      test:
        [
          "CMD-SHELL",
          "curl --silent --fail --output /dev/null http://backend:8080/health || exit 1",
        ]
      interval: "30s"
      timeout: "5s"
      retries: 6
      start_period: "60s"
      start_interval: "5s"
    labels:
      autoheal: "true"
    deploy:
      resources:
        limits:
          cpus: "0.8"
    pull_policy: "never"
    stdin_open: true

  frontend:
    image: "${NAME:?required}-frontend:${TARGET:?required}"
    depends_on:
      backend:
        condition: "service_started"
    environment:
      NODE_ENV: "production"
    command:
      - "node"
      - "/app/server.js"
    restart: "unless-stopped"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --output-document /dev/null http://frontend:8080 || exit 1",
        ]
      interval: "30s"
      timeout: "5s"
      retries: 6
      start_period: "60s"
      start_interval: "5s"
    labels:
      autoheal: "true"
    pull_policy: "never"

  reverse_proxy:
    image: "nginx:1.29-trixie-otel"
    depends_on:
      backend:
        condition: "service_started"
      frontend:
        condition: "service_started"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/etc/nginx/html:ro
      - files:/data/files:ro
    ports:
      - "0.0.0.0:${HTTP_PORT:?required}:80"
    command:
      - "nginx"
      - "-g"
      - "daemon off;"
    restart: "unless-stopped"
    healthcheck:
      test: ["CMD-SHELL", "service nginx status || exit 1"]
      interval: "30s"
      timeout: "5s"
      retries: 3
      start_period: "60s"
      start_interval: "5s"
    labels:
      autoheal: "true"
    pull_policy: "always"

volumes:
  data:
  files:
  certificates:
  gnupg:
  backend_logs:
