# Keep setup in sync with the one in ./docker-compose.production.yml
name: "${NAME}"

services:
  database:
    image: "postgres:13.23-trixie"
    volumes:
      - data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "postgres"
    # ports:
    #   - "0.0.0.0:5432:5432"
    # For possible command-line arguments see
    # https://www.postgresql.org/docs/current/app-postgres.html
    # and for possible configuration parameters like `max_connections` see
    # https://www.postgresql.org/docs/current/runtime-config.html
    # For an introduction to logging see
    # https://betterstack.com/community/guides/logging/how-to-start-logging-with-postgresql/
    command:
      [
        "-c",
        "max_connections=100"
          # "-c", "log_statement=all",
          # "-c", "log_duration=1"
      ]
    healthcheck:
      # pg_isready: https://www.postgresql.org/docs/13/app-pg-isready.html
      test: [ "CMD-SHELL", "pg_isready --username=postgres" ]
      interval: "5s"
      timeout: "5s"
      retries: "5"

  email:
    image: "rnwood/smtp4dev:v3.10"
    volumes:
      - emails:/smtp4dev
    environment:
      ServerOptions__BasePath: "/email"
      ServerOptions__HostName: "${HOST:?required}"
      ServerOptions__Database: "database.db"
      ServerOptions__NumberOfMessagesToKeep: "100"
      ServerOptions__NumberOfSessionsToKeep: "100"
      ServerOptions__TlsMode: "None"
      ServerOptions__TlsCertificate: ""
    # For all configuration options see
    # https://github.com/rnwood/smtp4dev/blob/master/docker-compose.yml
    # ports:
    # Web interface
    # - "0.0.0.0:4042:80"
    # SMTP server
    # - "0.0.0.0:25:25"
    # Imap server
    # - "0.0.0.0:143:143"
    healthcheck:
      test: [ "CMD-SHELL", "curl --silent --fail --output /dev/null http://email:80 || exit 1" ]
      interval: "30s"
      timeout: "30s"
      retries: "3"

  backend:
    build:
      context: "./backend"
      dockerfile: "./Dockerfile"
      args:
        CERTIFICATE_AUTHORITY_BASE_FILE_NAME: "${CERTIFICATE_AUTHORITY_BASE_FILE_NAME:?required}"
        CERTIFICATE_AUTHORITY_PASSWORD: "${CERTIFICATE_AUTHORITY_PASSWORD:?required}"
    depends_on:
      database:
        condition: "service_healthy"
      email:
        condition: "service_healthy"
    volumes:
      - ./backend:/app
      - files:/app/src/files
      - backend_vscode_server:/home/me/.vscode-server
      - backend_vscode_server_insiders:/home/me/.vscode-server-insiders
      # Create volume for GnuPG
      - gnupg:/home/me/.gnupg
      # The following items make the engine create anonymous volumes for the
      # specified path with the effect that the service does not write
      # temporary files into the corresponding directory on the host file
      # system that was bound by the `/app` binding.
      # - "/app/node_modules"
      - /app/src/logs
      - /app/src/bin
      - /app/src/obj
      - /app/test/bin
      - /app/test/obj
      # Create anonymous volumes for dotnet tools
      - /home/me/.nuget
      - /home/me/.dotnet
    # ports:
    #   - "0.0.0.0:8080:8080"
    environment:
      # https://docs.microsoft.com/en-us/aspnet/core/fundamentals/configuration/?view=aspnetcore-3.1#environment-variables
      ASPNETCORE_URLS: "http://0.0.0.0:8080"
      ASPNETCORE_ENVIRONMENT: "development"
      XBASE_Host: "https://${HOST:?required}:${HTTPS_PORT:?required}"
      XBASE_MetabaseHost: "https://${METABASE_HOST:?required}:${METABASE_HTTPS_PORT:?required}"
      XBASE_DatabaseId: "${DATABASE_ID:?required}"
      XBASE_OperatorId: "${OPERATOR_ID:?required}"
      XBASE_OpenIdConnectClient__Id: "${OPEN_ID_CONNECT_CLIENT_ID:?required}"
      XBASE_OpenIdConnectClient__Secret: "${OPEN_ID_CONNECT_CLIENT_SECRET:?required}"
      XBASE_VerificationCode: "${VERIFICATION_CODE:?required}"
      XBASE_JsonWebToken__EncryptionCertificatePassword: "${JSON_WEB_TOKEN_ENCRYPTION_CERTIFICATE_PASSWORD:?required}"
      XBASE_JsonWebToken__SigningCertificatePassword: "${JSON_WEB_TOKEN_SIGNING_CERTIFICATE_PASSWORD:?required}"
      XBASE_Email__SmtpHost: "${SMTP_HOST:?required}"
      XBASE_Email__SmtpPort: "${SMTP_PORT:?required}"
      XBASE_GnupgSecretSigningKey__Fingerprint: "${GNUPG_SECRET_SIGNING_KEY_FINGERPRINT:?required}"
      XBASE_GnupgSecretSigningKey__Passphrase: "${GNUPG_SECRET_SIGNING_KEY_PASSPHRASE:?required}"
      # https://learn.microsoft.com/en-us/dotnet/core/tools/dotnet-watch#environment-variables
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
      # https://github.com/dotnet/sdk/issues/50965#issuecomment-3649670760
      DOTNET_WATCH_PROCESS_CLEANUP_TIMEOUT_MS: "5"
      # https://docs.microsoft.com/en-us/aspnet/core/security/docker-compose-https#starting-a-container-with-https-support-using-docker-compose
      # ASPNETCORE_DOTNET_SYSTEM_NET_HTTP_SOCKETSHTTPHANDLER_LOGGING: "1"
      # ASPNETCORE_DOTNET_SYSTEM_NET_HTTP_SOCKETSHTTPHANDLER_LOGGING_SPECIFIER: "all"
      # The value `/dev/pts/0` is the output of running `tty` within `shellb`
      # https://www.gnupg.org/documentation/manuals/gnupg/Invoking-GPG_002dAGENT.html
      GPG_TTY: "/dev/pts/0"
    extra_hosts:
      - "${HOST:?required}:host-gateway"
      - "${METABASE_HOST:?required}:host-gateway"
    # user: "1000:1000"
    command:
      [
        "dotnet",
        "watch",
        "--non-interactive",
        "--no-hot-reload", # As of this writing, HotChocolate does not work with hot reload, see https://github.com/ChilliCream/graphql-platform/issues/5803#issuecomment-2689242812 However, `--no-hot-reload` fails to release the port when the clean-up timeout is 0, thus I set it to 5ms below via `DOTNET_WATCH_PROCESS_CLEANUP_TIMEOUT_MS`, which should be the default as of https://github.com/dotnet/sdk/issues/50965#issuecomment-3656670112 in version 10.0.2xx
        "--project",
        "/app/src/Database.csproj",
        "--",
        "run",
        "--no-launch-profile",
        "--project",
        "/app/src/Database.csproj"
      ]
    healthcheck:
      # https://docs.microsoft.com/en-us/aspnet/core/host-and-deploy/health-checks?view=aspnetcore-5.0#docker-example
      test: [ "CMD-SHELL", "curl --silent --fail --output /dev/null http://backend:8080/health || exit 1" ]
      interval: "30s"
      timeout: "30s"
      retries: "3"

  frontend:
    build:
      context: "./frontend"
      dockerfile: "./Dockerfile"
      args:
        CERTIFICATE_AUTHORITY_BASE_FILE_NAME: "${CERTIFICATE_AUTHORITY_BASE_FILE_NAME:?required}"
    depends_on:
      backend:
        condition: "service_healthy"
    volumes:
      - ./frontend:/app
      # The following items make the engine create anonymous volumes for the
      # specified path with the effect that the service does not write
      # temporary files into the corresponding directory on the host file
      # system that was bound by the `/app` binding.
      - /app/.next
      - /app/__generated__
      - /app/node_modules
    environment:
      NODE_ENV: "development"
    extra_hosts:
      - "${HOST:?required}:host-gateway"
    # user: "1000:1000"
    # ports:
    #   - "0.0.0.0:8081:8080"
    command: [ "yarn", "dev" ]
    healthcheck:
      test: [ "CMD-SHELL", "wget --quiet --output-document /dev/null http://frontend:8080 || exit 1" ]
      interval: "30s"
      timeout: "30s"
      retries: "3"

  nginx:
    image: "nginx:1.29-trixie-otel"
    depends_on:
      backend:
        condition: "service_healthy"
      email:
        condition: "service_healthy"
      frontend:
        condition: "service_healthy"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
      - ./nginx/templates/development:/etc/nginx/templates:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/etc/nginx/html:ro
      - files:/data/files:ro
      # - /etc/nginx/conf.d # run in read-only mode ...
      # - /var/cache/nginx # ...
      # - /var/run # ...
    environment:
      SERVER_NAME: "${HOST:?required}"
      SSL_CERTIFICATE_BASE_FILE_NAME: "${SSL_CERTIFICATE_BASE_FILE_NAME:?required}"
    ports:
      - "0.0.0.0:${HTTP_PORT:?required}:80"
      - "0.0.0.0:${HTTPS_PORT:?required}:443"
    command: [ "nginx-debug", "-g", "daemon off;" ] # run in debug mode
    healthcheck:
      test: [ "CMD-SHELL", "service nginx status || exit 1" ]
      interval: "30s"
      timeout: "30s"
      retries: "3"

volumes:
  data:
  emails:
  files:
  gnupg:
  backend_vscode_server:
  backend_vscode_server_insiders:
