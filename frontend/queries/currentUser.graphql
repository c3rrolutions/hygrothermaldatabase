fragment CurrentUserPartial on CurrentUser {
  uuid
  name
  isAtLeastAssistantManagerOfDatabaseOperator
}

query CurrentUser {
  currentUser {
    ...CurrentUserPartial
  }
}

query CurrentUserInfo {
  currentUserInfo {
    address {
      formatted
    }
    email
    emailVerified
    name
    phoneNumber
    phoneNumberVerified
    roles
    sub
    website
  }
}

# Force usage of
# `import type * as Types from '../__generated__/graphql';`
# in
# `./currentUser.generated.ts`
# to prevent TypeScript error
# `'Types' is declared but its value is never read.`
mutation ZZZDeleteDataZZZ($input: DeleteDataInput!) {
  deleteData(input: $input) {
    errors {
      code
      message
      path
    }
  }
}
