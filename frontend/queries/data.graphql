#import "./common.graphql"

fragment GetHttpsResourcePartial on GetHttpsResource {
  description
  hashValue
  locator
  dataFormatId
  dataFormat {
    uuid
    name
  }
  archivedFilesMetaInformation {
    path
    dataFormatId
    dataFormat {
      uuid
      name
    }
  }
}

fragment AppliedMethodPartial on AppliedMethod {
  methodId
  method {
    uuid
    name
  }
  arguments {
    name
    value
  }
  sources {
    name
    value {
      databaseId
      database {
        name
      }
      dataId
      dataKind
      dataTimestamp
    }
  }
}

fragment DataApprovalPartial on DataApproval {
  approverId
  approver {
    uuid
    name
  }
  keyFingerprint
  message
  query
  signature
  statement {
    ...ReferencePartial
  }
  timestamp
  variables
}

fragment ToTreeVertexAppliedConversionMethodPartial on ToTreeVertexAppliedConversionMethod {
  methodId
  method {
    uuid
    name
  }
  arguments {
    name
    value
  }
  sourceName
}

fragment DataPartial on Data {
  id
  uuid
  locale
  timestamp
  name
  description
  warnings
  createdAt
  componentId
  component {
    uuid
    name
  }
  creatorId
  creator {
    uuid
    name
  }
  databaseId
  database {
    uuid
    name
    locator
  }
  approvals {
    ...DataApprovalPartial
  }
  appliedMethod {
    ...AppliedMethodPartial
  }
  resourceTree {
    root {
      vertexId
      value {
        ...GetHttpsResourcePartial
      }
    }
    nonRootVertices {
      vertexId
      parentId
      appliedConversionMethod {
        ...ToTreeVertexAppliedConversionMethodPartial
      }
      value {
        ...GetHttpsResourcePartial
      }
    }
  }
}

fragment CalorimetricDataPartial on CalorimetricData {
  ...DataPartial
  gValues
  uValues
}

query CalorimetricData($id: Uuid!) {
  data: calorimetricData(id: $id) {
    ...CalorimetricDataPartial
  }
}

query AllCalorimetricData(
  $first: Int
  $after: String
  $where: CalorimetricDataPropositionInput
) {
  connection: allCalorimetricData(first: $first, after: $after, where: $where) {
    totalCount
    pageInfo {
      hasNextPage
      endCursor
    }
    edges {
      node {
        ...CalorimetricDataPartial
      }
    }
  }
}

query HasCalorimetricData($where: CalorimetricDataPropositionInput) {
  hasData: hasCalorimetricData(where: $where)
}

query AllCalorimetricDataNames(
  $first: Int!
  $after: String
  $where: CalorimetricDataPropositionInput
  $order: [CalorimetricDataSortInput!]
) {
  connection: allCalorimetricData(
    first: $first
    after: $after
    where: $where
    order: $order
  ) {
    totalCount
    pageInfo {
      hasNextPage
      endCursor
    }
    edges {
      node {
        id
        uuid
        name
      }
    }
  }
}

